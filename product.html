    <script>
        // ==========================================
        // 1. ระบบ Banner Slideshow แบบเลื่อน (Slide)
        // ==========================================
        let slideIndex = 0;
        const slidesWrapper = document.getElementById("slidesWrapper");
        const slides = document.getElementsByClassName("slide");

        function autoSlide() {
            if (!slidesWrapper || slides.length === 0) return;

            const totalSlides = slides.length;
            slideIndex++;

            // ถ้ารูปหมดแล้ว ให้กลับไปรูปแรก
            if (slideIndex >= totalSlides) {
                slideIndex = 0;
            }

            // เลื่อนกล่องหุ้มรูปภาพแนวนอน
            slidesWrapper.style.transform = `translateX(-${slideIndex * 100}%)`;

            // สั่งให้ทำซ้ำทุกๆ 3 วินาที (3000 มิลลิวินาที)
            setTimeout(autoSlide, 3000);
        }

        // เริ่มทำงานสไลด์หลังจากโหลดหน้าเสร็จ 3 วินาที
        setTimeout(autoSlide, 3000);

        // ==========================================
        // 2. ระบบดึงและแสดงข้อมูลสินค้าตาม ID จาก URL
        // ==========================================
        const productsDatabase = [
            {
                id: 1,
                name: " ปืนรัดสายไฟไนลอน (Mini Cable Tie Gun)",
                images: [
                    "images/124.png",
                    "images/126.png",
                    "images/128.png"
                ],
                description: "ปืนรัดสายไฟไนลอน (Mini Cable Tie Gun) จากแบรนด์ Megalok ผลิตจากวัสดุคุณภาพสูง ทนทานต่อการใช้งาน และออกแบบมาเพื่อการยึดติดที่แน่นหนาและปลอดภัย เหมาะสำหรับงานอุตสาหกรรมทั่วไป"
            },
            {
                id: 2,
                name: "สายเคเบิ้ลไทร์ไนลอนแบบล็อคตัวเอง (Self-locking nylon cable ties)",
                images: [
                    "images/14.png",
                    "images/28.png",
                    "images/139.png"
                ],
                description: "สายเคเบิ้ลไทร์ไนลอนแบบล็อคตัวเอง (Self-locking nylon cable ties) ซึ่งเป็นอุปกรณ์รัดสายไฟคุณภาพเยี่ยมระดับมืออาชีพที่ออกแบบมาให้สามารถใช้งานได้อย่างหลากหลายครับจุดเด่นสำคัญของสินค้ารุ่นนี้คือความแข็งแรงและทนทานต่อแรงดึงสูง เมื่อล็อคแล้วจะยึดติดแน่นหนาไม่หลุดลอกหรือคลายตัวได้ง่าย ตัววัสดุมีความปลอดภัยและถูกออกแบบมาให้ทนทานต่อสภาพแวดล้อมที่ท้าทายได้อย่างดีเยี่ยม ทั้งทนต่อการกัดกร่อน ทนต่อรังสียูวี ทนต่อสารเคมี รวมถึงทนต่อสภาพอากาศทั้งความเย็นจัดและอุณหภูมิที่สูงมาก นอกจากนี้ยังมีให้เลือกใช้งานหลากหลายรูปแบบตามความเหมาะสม ทั้งแบบสายสีดำและสีขาวเพื่อตอบโจทย์ทุกความต้องการของงาน"
            },
            {
                id: 3,
                name: "(Stainless Steel Cable Tie Gun/Tensioner Tool) เครื่องมือรัดสายไฟสแตนเลส",
                images: [
                    "images/112.png",
                    "images/116.png",
                    "images/118.png",
                    "images/120.png"
                ],
                description: "อุปกรณ์ที่ออกแบบมาเพื่อใช้สำหรับการจัดเก็บและยึดสายไฟให้เป็นระเบียบเรียบร้อย โดยมีจุดเด่นในเรื่องของความทนทานต่อความร้อนและทนต่อสภาพอากาศที่เปลี่ยนแปลงได้เป็นอย่างดีเยี่ยม สำหรับขนาดของสายรัดที่สามารถนำมาใช้งานร่วมกับอุปกรณ์ตัวนี้ได้ จะต้องมีความกว้างอยู่ที่ 4 ถึง 20 มิลลิเมตร และมีความหนาตั้งแต่ 0.4 ถึง 0.8 มิลลิเมตรครับ"
            },
            {
                id: 4,
                name: "Tie Gun (เครื่องมือดึงสายรัดและตัดอัตโนมัติ)",
                images: [
                    "images/94.png",
                    "images/43.png"
                ],
                description: "เครื่องมือดึงสายรัดและตัดอัตโนมัติ (Tie Gun) ที่ถูกออกแบบมาให้ใช้งานได้ง่าย ช่วยลดเวลาในการทำงานและเพิ่มความสะดวกสบายให้กับผู้ใช้งานเป็นอย่างมากครับ ตัวเครื่องมีความโดดเด่นในเรื่องของความแข็งแรงทนทานเนื่องจากผลิตจากเหล็กกล้าเครื่องมือพิเศษ (Special Tool Steel Body) และมีการออกแบบตามหลักสรีรศาสตร์ (Ergonomic design) โดยเฉพาะในส่วนของด้ามจับ TPR ที่ช่วยให้จับได้ถนัดมือและใช้งานได้อย่างสะดวกสบาย นอกจากนี้ตัวเครื่องยังมีสปริงที่มีความยืดหยุ่นกำลังดี หัวตัดที่คมกริบ และมีด้ามจับสำหรับการตัด (Cutting Handle) ที่ออกแบบมาให้ใช้งานง่าย เพียงแค่ดันขึ้นก็สามารถตัดสายรัดให้ขาดได้อย่างสมบูรณ์ครับ"
            }
        ];

        // รับค่า id จากพารามิเตอร์ใน URL (เช่น product.html?id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        // หาสินค้าที่ตรงกับ ID
        const product = productsDatabase.find(p => p.id === productId);
        const displayDiv = document.getElementById('product-display');

        // ฟังก์ชันสำหรับเปลี่ยนรูปภาพใหญ่ เมื่อผู้ใช้คลิกที่รูป Thumbnail เล็ก
        window.changeImage = function (newSrc) {
            const mainImg = document.getElementById('mainImage');
            mainImg.style.opacity = 0.5;
            setTimeout(() => {
                mainImg.src = newSrc;
                mainImg.style.opacity = 1;
            }, 150);
        };

        // Render ข้อมูลลง HTML
        if (product) {
            let thumbnailsHTML = '';
            product.images.forEach((imgSrc, index) => {
                thumbnailsHTML += `<img src="${imgSrc}" class="thumbnail" onclick="changeImage('${imgSrc}')" alt="thumbnail ${index + 1}">`;
            });

            displayDiv.innerHTML = `
                <h3 class="section-tag">↳ Product Detail: ${product.name}</h3>
                <div class="product-flex">
                    
                    <div class="product-gallery">
                        <div class="product-image-wrapper">
                            <img src="${product.images[0]}" alt="${product.name}" id="mainImage" class="product-image">
                        </div>
                        <div class="thumbnail-container">
                            ${thumbnailsHTML}
                        </div>
                    </div>

                    <div class="product-info">
                        <h1 class="product-title">${product.name}</h1>
                        <div class="product-desc">
                            <strong>↳ Product Features:</strong><br><br>
                            ${product.description}
                        </div>
                        <a href="index.html#product" class="btn-theme">⬅ กลับไปหน้าสินค้า</a>
                    </div>
                </div>
            `;
        } else {
            // กรณีไม่มี ID หรือหาสินค้าไม่เจอ
            displayDiv.innerHTML = `
                <h3 class="section-tag" style="color: red;">↳ Error: ไม่พบสินค้า</h3>
                <p style="text-align: center; margin-top: 50px;">กรุณากลับไปเลือกสินค้าใหม่อีกครั้ง</p>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="index.html#product" class="btn-theme">⬅ กลับไปหน้าหลัก</a>
                </div>
            `;
        }

        // ==========================================
        // 3. ระบบ Dark Mode (อ่านค่าและสลับโหมด)
        // ==========================================
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;

        // เช็คค่าเมื่อหน้าเว็บโหลดเสร็จ
        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            document.documentElement.classList.remove('dark-mode-preload');
            if (darkModeToggle) {
                darkModeToggle.textContent = '☀️';
            }
        }

        if (darkModeToggle) {
            darkModeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');

                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('darkMode', 'enabled');
                    darkModeToggle.textContent = '☀️';
                } else {
                    localStorage.setItem('darkMode', 'disabled');
                    darkModeToggle.textContent = '🌙';
                }
            });
        }
    </script>

</body>
